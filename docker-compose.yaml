

services:
  app:
    build:
      dockerfile: ./Dockerfile
    ports:
      - "8000:8000"
    command:
      - 'uvicorn'
      - 'backend.clone_twitter:app'
      - '--host'
      - '127.0.0.1'
      - '--port'
      - '8000'
    logging:
      driver: loki
      options:
        loki-url: http://localhost:3100/loki/api/v1/push

  db:
    image: postgres:15.6
    environment:
      - POSTGRES_DB=twitter
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=u123
    ports:
      - '5432:5432'
    hostname: localhost
    volumes:
      - ./db/:/var/lib/postgresql/data

  nginx:
    image: nginx:1.25-alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - '3000:3000'

  loki:
    image: grafana/loki:3.0.0
    ports:
      - '3100:3100'

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml