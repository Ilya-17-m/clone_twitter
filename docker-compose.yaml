
services:
  app:
    build: .
    ports:
      - "8000:8000"
    command:
      - 'poetry'
      - 'run'
      - 'uvicorn'
      - 'backend.clone_twitter:app'
      - '--host'
      - '127.0.0.1'
      - '--port'
      - '8000'

  db:
    image: postgres:latest
    environment:
      - POSTGRES_DB=twitter
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=u123
    ports:
      - '5432:5432'
    hostname: localhost
    volumes:
      - ./db/:/var/lib/postgresql/data

  nginx:
    image: nginx
    ports:
      - '80:80'
    hostname: localhost


  prometheus:
    image: prom/prometheus:v3.11.1
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml
    ports:
      - '9090:9090'


  grafana:
    image: grafana/grafana:5.1.0
    ports:
      - '3000:3000'
