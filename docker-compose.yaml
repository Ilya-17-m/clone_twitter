

services:
  app:
    build:
      dockerfile: ./Dockerfile
    ports:
      - "8000:8000"
    command:
      - 'uvicorn'
      - 'backend.clone_twitter:app'
      - '--host'
      - '127.0.0.1'
      - '--port'
      - '8000'
    logging:
      driver: loki
      options:
        loki-url: http://localhost:3100/loki/api/v1/push

  db:
    image: postgres:latest
    environment:
      - POSTGRES_DB=twitter
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=u123
    ports:
      - '5432:5432'
    hostname: localhost
    volumes:
      - ./db/:/var/lib/postgresql/data

  nginx:
    image: nginx:latest
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

  grafana:
    image: grafana/grafana:latest
    container_name: twitter_grafana
    ports:
      - '3000:3000'

  loki:
    image: grafana/loki:latest
    container_name: twitter_loki
    ports:
      - '3100:3100'

  prometheus:
    image: prom/prometheus:latest
    container_name: twitter_prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml